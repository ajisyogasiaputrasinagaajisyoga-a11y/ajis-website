<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajis Developer</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    header h1 {
      color: #38bdf8;
    }

    nav a {
      margin: 0 15px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    .hero h2 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero span {
      color: #38bdf8;
    }

    .hero p {
      color: #cbd5f5;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #38bdf8;
      border-radius: 30px;
      text-decoration: none;
      color: black;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #0ea5e9;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .projects {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      width: 250px;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

<header>
  <h1>Ajis Dev</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Hello, I'm <span>Ajis</span></h2>
  <p>I create fast, modern and professional websites</p>
  <a href="#" class="btn">Hire Me</a>
</section>

<section class="section">
  <h2>My Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Business Website</h3>
      <p>Clean and modern company profile</p>
    </div>
    <div class="card">
      <h3>Landing Page</h3>
      <p>High-converting design</p>
    </div>
    <div class="card">
      <h3>E-Commerce</h3>
      <p>Simple online store</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Ajis Developer</p>
</footer>

</body>
</html>
